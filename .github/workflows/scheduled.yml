name: Scheduled Update
on:
    schedule:
        - cron: "0 * * * *"
    workflow_dispatch:

permissions:
    contents: write
    issues: read
    pages: write
    id-token: write

jobs:
    generate-rss:
        outputs:
            changed: ${{ steps.commit.outputs.changed }}
            ref: ${{ steps.commit.outputs.ref }}
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Generate RSS feed
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  python _python/rss_dotnet.py
                  python _python/rss_insurance.py
                  python _python/rss_secops.py

            - name: Commit and push
              id: commit
              run: |-
                  git diff
                  git config user.name "GitHub Action"
                  git config user.email "action@github.com"
                  git add -A

                  if git diff --staged --quiet; then
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  git commit -m "Chore: Update RSS feeds for `date +'%Y-%m-%d %H:%M'`"
                  git push
                  echo "changed=true" >> "$GITHUB_OUTPUT"
                  echo "ref=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    deploy:
        needs: generate-rss
        if: needs.generate-rss.outputs.changed == 'true'
        uses: ./.github/workflows/deploy-pages.yml
        with:
            ref: ${{ needs.generate-rss.outputs.ref }}
        secrets: inherit
